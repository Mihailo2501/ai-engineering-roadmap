<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4ead3" />
    <meta name="description" content="A cartographer's map of my journey through AI agent engineering. Six phases, dozens of checkpoints, one summit." />
    <meta property="og:title" content="AI Engineering Roadmap" />
    <meta property="og:description" content="A cartographer's map of my journey through AI agent engineering. Six phases, dozens of checkpoints, one summit." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap"
      media="print"
      onload="this.media='all'; this.onload=null;"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap"
      />
    </noscript>
    <title>AI Engineering Roadmap</title>
  </head>
  <body class="bg-parchment">
    <div id="root">
      <main class="aer-skeleton">
        <div class="aer-skeleton-inner">
          <p class="aer-skeleton-eyebrow">A cartographer&apos;s chart</p>
          <h1 class="aer-skeleton-title">AI&nbsp;Engineering<br/>Roadmap</h1>
          <p class="aer-skeleton-sub">six phases &middot; one summit &middot; setting sail</p>
          <svg viewBox="0 0 80 80" width="56" height="56" class="aer-skeleton-compass" aria-hidden="true">
            <circle cx="40" cy="40" r="36" fill="#e7d6ad" stroke="#1c1610" stroke-width="1.4"/>
            <polygon points="40,12 46,40 40,68 34,40" fill="#a73a26" stroke="#1c1610" stroke-width="0.6"/>
            <circle cx="40" cy="40" r="3" fill="#1c1610"/>
          </svg>
        </div>
      </main>
      <style>
        .aer-skeleton{min-height:100dvh;display:flex;align-items:center;justify-content:center;font-family:Cinzel,"Trajan Pro","Cormorant Garamond",serif;color:#1c1610;background:#f4ead3;padding:24px;}
        .aer-skeleton-inner{display:flex;flex-direction:column;align-items:center;text-align:center;max-width:100%;}
        .aer-skeleton-eyebrow{font-size:clamp(11px,2.4vw,14px);letter-spacing:0.4em;text-transform:uppercase;color:#a73a26;margin:0 0 18px 0;}
        .aer-skeleton-title{font-size:clamp(64px,14vw,168px);line-height:0.95;letter-spacing:0.04em;margin:0 0 24px 0;font-weight:500;}
        .aer-skeleton-sub{font-family:"Source Serif 4","Lora",Georgia,serif;font-style:italic;font-size:clamp(14px,2.4vw,20px);color:#3a2f24;margin:0 0 32px 0;}
        .aer-skeleton-compass{animation:aer-spin 8s linear infinite;}
        @keyframes aer-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        @media (prefers-reduced-motion:reduce){.aer-skeleton-compass{animation:none;}}
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
