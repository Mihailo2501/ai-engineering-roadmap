<svg xmlns="http://www.w3.org/2000/svg" width="540" height="540" viewBox="0 0 540 540">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="14" stitchTiles="stitch" />
    <feColorMatrix type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.10  0 0 0 0 0.05  0 0 0 0.05 0" />
  </filter>
  <filter id="fiber">
    <feTurbulence type="turbulence" baseFrequency="0.012 0.04" numOctaves="2" seed="9" />
    <feDisplacementMap in="SourceGraphic" scale="6" />
    <feColorMatrix type="matrix" values="0 0 0 0 0.30  0 0 0 0 0.22  0 0 0 0 0.12  0 0 0 0.08 0" />
  </filter>
  <rect width="540" height="540" fill="#f4ead3" />
  <rect width="540" height="540" filter="url(#grain)" opacity="0.7" />
  <rect width="540" height="540" filter="url(#fiber)" opacity="0.45" />
</svg>
